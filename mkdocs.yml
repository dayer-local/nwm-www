site_name: New Welsh Mesh
site_url: https://welshmesh.pysgod.xyz/
repo_url: https://github.com/dayer-local/nwm-www
repo_name: dayer-local/nwm-www
edit_uri: edit/main/docs/

theme:
  name: material
  logo: nwm-white.png
  favicon: nwm-white.png
  palette: 
    - scheme: default
      primary: custom 
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - content.action.edit
    - navigation.footer

extra_css:
  - stylesheets/style.css

copyright: Copyright &copy; 2026 <a href="https://welshmesh.pysgod.xyz/copyright/">Pysgod Media<a/> / Not affiliated with Meshtastic LLC

extra:
  social:
    - icon: fontawesome/brands/discord
      link: https://discord.gg/4VhKqbH39W
  

nav:
  - Home: index.md
  - Getting Started:
    - Setup Guide: docs/getting-started.md
    - Node Choices: docs/node-choices.md
    - Node Configuration: docs/node-settings.md
  - Using the Mesh:
    - Mesh Etiquette: docs/mesh-etiquette.md
  - Community:
    - Get Involved: docs/get-involved.md
    - Node Operators: docs/node-operators.md

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - tables
  - attr_list  # This is needed to make your { width="35%" } and buttons work!

use_directory_urls: true
